name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -c ../.github/constraints-ci.txt -e ".[dev,inference]"

      - name: Check formatting with black
        working-directory: backend
        run: black --check .

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            infra/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - run: npm ci
        working-directory: infra

      - name: Type-check CDK
        working-directory: infra
        run: npx tsc --noEmit

  lint-shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.11"
          ACTIONLINT_CHECKSUM="900919a84f2229bac68ca9cd4103ea297abc35e9689ebb842c6e34a3d1b01b0a"
          mkdir -p "$HOME/.local/bin"
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          echo "${ACTIONLINT_CHECKSUM}  actionlint.tar.gz" | sha256sum --check
          tar xz -C "$HOME/.local/bin" actionlint < actionlint.tar.gz
          rm actionlint.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run actionlint (includes shellcheck)
        run: actionlint

  test-python:
    needs: [lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -c ../.github/constraints-ci.txt -e ".[dev,inference]"

      - name: Run tests
        working-directory: backend
        run: pytest --ignore=tests/test_train.py --cov --cov-report=xml --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5.6.0
        with:
          files: backend/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}

  test-typescript:
    needs: [lint-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npx vitest run --coverage
        working-directory: frontend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5.6.0
        with:
          files: frontend/coverage/clover.xml
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  test-cdk:
    needs: [lint-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            frontend/package-lock.json

      - run: npm ci
        working-directory: infra

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: npm test
        working-directory: infra

      - run: npx cdk synth --quiet
        working-directory: infra
