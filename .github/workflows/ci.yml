name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev,inference]"

      - name: Check formatting with black
        working-directory: backend
        run: black --check .

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            infra/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - run: npm ci
        working-directory: infra

      - name: Type-check CDK
        working-directory: infra
        run: npx tsc --noEmit

  lint-shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL "https://github.com/rhysd/actionlint/releases/latest/download/actionlint_$(curl -sL https://api.github.com/repos/rhysd/actionlint/releases/latest | jq -r '.tag_name' | sed 's/^v//')_linux_amd64.tar.gz" | tar xz -C "$HOME/.local/bin" actionlint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run actionlint (includes shellcheck)
        run: actionlint

  test-python:
    needs: [lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev,inference]"

      - name: Run tests
        working-directory: backend
        run: pytest --ignore=tests/test_train.py --cov --cov-report=xml --cov-fail-under=90

  test-typescript:
    needs: [lint-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npx vitest run --coverage
        working-directory: frontend

  test-cdk:
    needs: [lint-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            frontend/package-lock.json

      - run: npm ci
        working-directory: infra

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: npm test
        working-directory: infra

      - run: npx cdk synth --quiet
        working-directory: infra
