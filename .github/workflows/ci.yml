name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev,inference]"

      - name: Run tests
        working-directory: backend
        run: pytest --ignore=tests/test_train.py --cov --cov-report=xml --cov-fail-under=90

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npx vitest run --coverage
        working-directory: frontend

  test-cdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            frontend/package-lock.json

      - run: npm ci
        working-directory: infra

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: npm test
        working-directory: infra

      - run: npx tsc --noEmit
        working-directory: infra

      - run: npx cdk synth --quiet
        working-directory: infra
