name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - run: npm ci
        working-directory: infra

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      # Deploy TrainingStack first to drop the old dataBucket cross-stack
      # import before StorageStack tries to remove the corresponding export.
      # TODO: revert to just `cdk deploy --all` after one successful deploy.
      - run: npx cdk deploy PeftTrainingStack --exclusively --require-approval never
        working-directory: infra

      - run: npx cdk deploy --all --require-approval never
        working-directory: infra
