name: Process Speeches

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Number of speeches to sample (0 = all)"
        required: false
        default: "0"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      SAMPLE_SIZE: ${{ github.event.inputs.sample_size || '0' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_PROCESS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Submit process job
        id: submit
        run: |
          if ! [[ "$SAMPLE_SIZE" =~ ^[0-9]+$ ]]; then
            echo "Invalid sample_size: must be a non-negative integer"
            exit 1
          fi

          if [ "$SAMPLE_SIZE" != "0" ] && [ -n "$SAMPLE_SIZE" ]; then
            COMMAND="python -m scraper.clean_and_format --bucket \$DATA_BUCKET --output-bucket \$TRAINING_DATA_BUCKET --sample $SAMPLE_SIZE"
          else
            COMMAND="python -m scraper.clean_and_format --bucket \$DATA_BUCKET --output-bucket \$TRAINING_DATA_BUCKET"
          fi

          JOB_ID=$(aws batch submit-job \
            --job-name "process-speeches-$(date +%Y%m%d-%H%M%S)" \
            --job-queue peft-scraper-job-queue \
            --job-definition peft-process-speeches \
            --container-overrides "{\"command\": [\"sh\", \"-c\", \"$COMMAND\"]}" \
            --query 'jobId' --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted Batch job: $JOB_ID (sample_size=$SAMPLE_SIZE)"

      - name: Poll until complete
        id: poll
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          while true; do
            STATUS=$(aws batch describe-jobs --jobs "$JOB_ID" \
              --query 'jobs[0].status' --output text)
            echo "$(date +%H:%M:%S) Job $JOB_ID status: $STATUS"
            case "$STATUS" in
              SUCCEEDED)
                echo "status=SUCCEEDED" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              FAILED)
                echo "status=FAILED" >> "$GITHUB_OUTPUT"
                REASON=$(aws batch describe-jobs --jobs "$JOB_ID" \
                  --query 'jobs[0].statusReason' --output text)
                echo "Job failed: $REASON"
                exit 1
                ;;
            esac
            sleep 30
          done
