name: Process Speeches

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Submit process job
        id: submit
        run: |
          JOB_ID=$(aws batch submit-job \
            --job-name "process-speeches-$(date +%Y%m%d-%H%M%S)" \
            --job-queue peft-scraper-job-queue \
            --job-definition peft-process-speeches \
            --query 'jobId' --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted Batch job: $JOB_ID"

      - name: Poll until complete
        id: poll
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          while true; do
            STATUS=$(aws batch describe-jobs --jobs "$JOB_ID" \
              --query 'jobs[0].status' --output text)
            echo "$(date +%H:%M:%S) Job $JOB_ID status: $STATUS"
            case "$STATUS" in
              SUCCEEDED)
                echo "status=SUCCEEDED" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              FAILED)
                echo "status=FAILED" >> "$GITHUB_OUTPUT"
                REASON=$(aws batch describe-jobs --jobs "$JOB_ID" \
                  --query 'jobs[0].statusReason' --output text)
                echo "Job failed: $REASON"
                exit 1
                ;;
            esac
            sleep 30
          done
