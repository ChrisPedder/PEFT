name: Update Model

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Bedrock imported model name"
        type: string
        default: "peft-obama"
      role_arn:
        description: "IAM role ARN for Bedrock S3 access (auto-detected if empty)"
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  import-to-bedrock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install boto3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Import model to Bedrock
        working-directory: backend
        run: |
          ARGS="--model-name ${{ inputs.model_name }}"
          if [ -n "${{ inputs.role_arn }}" ]; then
            ARGS="$ARGS --role-arn ${{ inputs.role_arn }}"
          fi
          python scripts/import_to_bedrock.py $ARGS
