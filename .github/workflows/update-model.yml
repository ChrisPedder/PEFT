name: Update Model

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Bedrock imported model name"
        type: string
        default: "peft-obama"
      training_job_name:
        description: "SageMaker training job name (auto-detects latest if empty)"
        type: string
        default: ""
      role_arn:
        description: "IAM role ARN for Bedrock S3 access (auto-detected if empty)"
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  merge-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --require-hashes -r .github/requirements-update-model.txt

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_UPDATE_MODEL_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Create swap space
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      - name: Download and extract adapter
        env:
          TRAINING_JOB_NAME: ${{ inputs.training_job_name }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="peft-model-artifacts-${ACCOUNT_ID}"

          if [ -n "${TRAINING_JOB_NAME}" ]; then
            JOB_NAME="${TRAINING_JOB_NAME}"
          else
            JOB_NAME=$(aws s3 ls "s3://${BUCKET}/" | grep "PRE" | awk '{print $2}' | tr -d '/' | sort | tail -1)
          fi

          echo "Using training job: ${JOB_NAME}"
          aws s3 cp "s3://${BUCKET}/${JOB_NAME}/output/model.tar.gz" model.tar.gz
          mkdir adapter
          tar xzf model.tar.gz -C adapter
          ls -la adapter/

      - name: Merge adapter into base model
        working-directory: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          python training/merge_adapter.py \
            --adapter-path ../adapter \
            --merged-output ../merged_model \
            --upload-bucket "peft-model-artifacts-${ACCOUNT_ID}"

      - name: Import model to Bedrock
        working-directory: backend
        env:
          MODEL_NAME: ${{ inputs.model_name }}
          ROLE_ARN: ${{ inputs.role_arn }}
        run: |
          if [ -n "${ROLE_ARN}" ]; then
            python scripts/import_to_bedrock.py --model-name "${MODEL_NAME}" --role-arn "${ROLE_ARN}"
          else
            python scripts/import_to_bedrock.py --model-name "${MODEL_NAME}"
          fi
